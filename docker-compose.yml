version: '3.8'

services:
  # PostgreSQL Datenbank
  postgres:
    image: postgres:15-alpine
    container_name: mahl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mahl
      POSTGRES_USER: mahl_user
      POSTGRES_PASSWORD: mahl_dev_password
      # Optionales Tuning für Entwicklung
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      # Persistente Daten (bleibt erhalten nach Container-Neustart)
      - postgres_data:/var/lib/postgresql/data
      # Optional: Seed-Data beim ersten Start laden
      # - ./Server/Data/SeedData.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahl_user -d mahl"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin für visuelle Datenbank-Verwaltung
  # Entkommentieren falls benötigt
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: mahl-pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@mahl.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
    name: mahl_postgres_data

networks:
  default:
    name: mahl_network
